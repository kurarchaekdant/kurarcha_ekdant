<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donation Payment | Kurarcha Ekdant</title>

<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Mukta:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--maroon:#330d0f;
--gold:#eec463;
--cream:#fbecd2;
--paper:#f3e2bd;
--font-display:'Yatra One',serif;
--font-body:'Mukta',sans-serif;
}

*{box-sizing:border-box;}

body{
margin:0;
background:var(--paper);
font-family:var(--font-body);
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */
header{
background:var(--maroon);
border-bottom:1px solid rgba(238,196,99,.25);
}

.nav-inner{
display:flex;
align-items:center;
padding:14px 24px;
}

.brand{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:var(--cream);
}

.brand img{
width:55px;
height:55px;
}

.brand-text{
font-family:var(--font-display);
font-size:1.1rem;
line-height:1.1;
}

.brand-text small{
display:block;
font-size:.7rem;
color:var(--gold);
}

/* MAIN */
main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:25px;
}

.card{
width:100%;
max-width:430px;
background:var(--maroon);
padding:26px;
border-radius:16px;
border:1px solid rgba(238,196,99,.3);
color:var(--cream);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

h2{
text-align:center;
font-family:var(--font-display);
margin:0;
}

.amount{
text-align:center;
font-size:2rem;
font-weight:700;
color:var(--gold);
margin:18px 0;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:1rem;
outline:none;
}

/* RADIO */
.options{
margin-top:12px;
display:flex;
flex-direction:column;
gap:6px;
}

.option{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
padding:4px 6px;
}

.option input{
width:16px;
height:16px;
margin:0;
}

/* PAUTI FIELD (FINAL FIX) */
#pauti{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:1rem;
text-align:center;
background:rgba(255,255,255,0.08);
color:#eec463;
font-weight:700;
text-transform:uppercase;   /* FORCE CAPS DISPLAY */
}

/* BUTTON */
button{
width:100%;
padding:13px;
margin-top:16px;
border:none;
border-radius:10px;
background:var(--gold);
color:var(--maroon);
font-weight:700;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

/* FOOTER */
footer{
background:var(--maroon);
color:rgba(251,236,210,.7);
text-align:center;
padding:22px;
font-size:.85rem;
border-top:1px solid rgba(238,196,99,.2);
}

.foot-mark{
font-family:var(--font-display);
color:var(--gold);
display:block;
margin-bottom:5px;
}

/* UPI APP SELECTION */
.upi-apps{
  display:none;
  margin-top:20px;
  padding-top:18px;
  border-top:1px solid rgba(238,196,99,.2);
}
.upi-pay-btn{
  width:100%;
  margin:0;
  padding:15px;
  background:linear-gradient(135deg, var(--gold), #c9952f);
  color:#2a0d0d;
  border:none;
  border-radius:12px;
  font-weight:800;
  font-size:1rem;
  letter-spacing:.02em;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:transform .15s ease, box-shadow .15s ease;
  font-family:var(--font-body);
}
.upi-pay-btn:hover{
  box-shadow:0 8px 24px rgba(238,196,99,.35);
  transform:translateY(-1px);
}
.upi-pay-btn:active{
  transform:scale(.98);
}
.upi-pay-btn.is-loading{
  opacity:.65;
  pointer-events:none;
}
.upi-pay-icon{
  font-size:1.15rem;
}
.upi-apps-hint{
  text-align:center;
  margin-top:14px;
  font-size:.72rem;
  color:rgba(251,236,210,.5);
}
.upi-apps-status{
  text-align:center;

  margin-top:10px;
  font-size:.78rem;
  font-weight:600;
  color:var(--gold);
  min-height:18px;
}

</style>
</head>

<body>

<header>
<div class="nav-inner">

<a class="brand" href="index.html">
<img src="logo-nav.png">

<div class="brand-text">
Kurarcha Ekdant
<small>Mumbai - 400097</small>
</div>

</a>

</div>
</header>

<main>

<div class="card">

<h2>Donation Payment</h2>

<div class="amount" id="amount">₹0</div>

<input id="name"
type="text"
placeholder="Enter Name"
oninput="this.value=this.value.replace(/[^a-zA-Z\s]/g,'')">

<input id="mobile"
type="tel"
inputmode="numeric"
maxlength="10"
placeholder="Enter Mobile Number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<div class="options">

<label class="option">
<input type="radio" name="pautiMode" onclick="setMode('have')">
I have Pauti Number
</label>

<label class="option">
<input type="radio" name="pautiMode" onclick="setMode('dont')">
I don’t have Pauti Number
</label>

</div>

<input id="pauti" placeholder="Select an option above first" disabled
oninput="this.value=this.value.toUpperCase()">

<button onclick="pay()" id="payBtn">Proceed To Pay</button>

<!-- UPI app selection — shown after form validation passes -->
<div id="upiApps" class="upi-apps">
  <button type="button" class="upi-pay-btn" id="upiPayBtn" onclick="openUpiApp()">
    <span class="upi-pay-icon">💳</span>
    Pay via UPI Apps
  </button>
  <div class="upi-apps-hint">You'll be asked to choose from UPI apps installed on your phone</div>
  <div class="upi-apps-status" id="upiStatus"></div>
</div>
</div>

</div>

</main>

<footer>
<span class="foot-mark">गणपती बाप्पा मोरया</span>
© <span id="year"></span> Kurarcha Ekdant
</footer>

<script>

document.getElementById("year").textContent =
new Date().getFullYear();

/* AMOUNT */
const params = new URLSearchParams(window.location.search);
let amount = params.get("amount") || 0;
document.getElementById("amount").innerText = "₹" + amount;

/* PAUTI SYSTEM */
let generated = null;

/* PAY */
let pautiMode = null; // tracks which radio is selected

function setMode(type){
  pautiMode = type;

  let input = document.getElementById("pauti");

  if(type === "have"){
    input.disabled = false;
    input.value = "";
    input.placeholder = "Enter Your Pauti Number";
    input.style.color = "#eec463";
    input.style.fontWeight = "700";
    input.focus();
  }

  if(type === "dont"){
    input.disabled = true;

    if(!generated){
      let count = localStorage.getItem("pautiCount") || 0;
      count++;
      localStorage.setItem("pautiCount", count);
      generated = "ON" + String(count).padStart(2,"0");
    }

    input.value = generated;
    input.style.color = "#eec463";
    input.style.fontWeight = "700";
  }
}

function pay(){

  let name = document.getElementById("name").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let pauti = document.getElementById("pauti").value.trim();

  if(name.length < 3){
    alert("Enter valid name");
    return;
  }

  if(!/^[6-9]\d{9}$/.test(mobile)){
    alert("Enter valid mobile number");
    return;
  }

  // Pauti is now compulsory
  if(!pautiMode){
    alert("Please select whether you have a Pauti number or not");
    return;
  }

  if(pautiMode === "have" && pauti.length < 2){
    alert("Please enter your Pauti number");
    document.getElementById("pauti").focus();
    return;
  }

  if(pautiMode === "dont" && !pauti){
    alert("Something went wrong generating your Pauti number. Please reselect the option.");
    return;
  }

  // All valid — reveal UPI app selection instead of guessing one link
  document.getElementById("payBtn").style.display = "none";
  document.getElementById("upiApps").classList.add("is-visible");
  document.getElementById("upiApps").style.display = "block";
  document.getElementById("upiApps").scrollIntoView({behavior:"smooth", block:"center"});

}

function openUpiApp(){

  let pauti = document.getElementById("pauti").value.trim();
  let payeeName = "Kurarcha Ekdant Ganesh Mandal";
  let note = "Donation - Pauti " + pauti;
  let statusEl = document.getElementById("upiStatus");
  let btn = document.getElementById("upiPayBtn");

  let params = "pa=ns008072-1@okicici"
             + "&pn=" + encodeURIComponent(payeeName)
             + "&am=" + amount
             + "&cu=INR"
             + "&tn=" + encodeURIComponent(note);

  let isAndroid = /Android/i.test(navigator.userAgent);
  let isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if(!isAndroid && !isIOS){
    statusEl.textContent = "UPI payment works only on mobile devices. Please open this page on your phone.";
    return;
  }

  if(btn) btn.classList.add("is-loading");
  statusEl.textContent = "Opening UPI...";

  // Fallback URL — if NO UPI app is found at all, redirect here instead of
  // showing Chrome's broken "Web page not available" system error page
  let fallbackUrl = window.location.href.split("#")[0].split("?")[0]
                   + "?amount=" + amount + "&noupi=1";

  let link;
  if(isAndroid){
    // Android Chrome's official intent:// syntax — this is what actually triggers
    // the native bottom-sheet "Open with..." app picker showing every installed
    // UPI app, exactly like sharing a photo or link. If literally no UPI app is
    // installed, Chrome follows browser_fallback_url instead of erroring out.
    link = "intent://pay?" + params
         + "#Intent;scheme=upi;action=android.intent.action.VIEW;"
         + "S.browser_fallback_url=" + encodeURIComponent(fallbackUrl) + ";end";
  } else {
    // iOS has no intent:// equivalent — generic upi:// is the only option,
    // and there is no clean fallback path if no app is found
    link = "upi://pay?" + params;
  }

  window.location.href = link;

  setTimeout(function(){
    if(btn) btn.classList.remove("is-loading");
  }, 1200);

}

// Show a friendly message if redirected back here with no UPI app found
(function checkNoUpiFallback(){
  let qs = new URLSearchParams(window.location.search);
  if(qs.get("noupi") === "1"){
    let statusEl = document.getElementById("upiStatus");
    if(statusEl){
      statusEl.innerHTML = "No UPI app was found on this device.<br>Please install Google Pay, PhonePe, or Paytm, or share your Pauti number with the committee to pay manually.";
      statusEl.style.color = "#f87171";
    }
  }
})();

</script>


</body>
</html>
