  --gold:#d79921;

  --gold-dim:rgba(215,153,33,.15);

}

*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html,body{

}

/* ===== FLAME ANIMATION (signature element) ===== */
@keyframes flicker{
  0%,100%{ transform:scaleY(1) skewX(0deg); opacity:1; }
  25%{ transform:scaleY(1.06) skewX(-2deg); opacity:.92; }
  50%{ transform:scaleY(.96) skewX(1.5deg); opacity:.88; }

}
@keyframes shimmer{
  0%{ background-position:200% center; }
  100%{ background-position:-200% center; }
}
@keyframes fadeIn{
  from{ opacity:0; transform:translateY(8px); }
  to{ opacity:1; transform:none; }

<script>
'use strict';

const scrollArea = document.getElementById('aartiPages');

/* ===== FONT SIZE CONTROL ===== */
let fontSize = 1.22;
const fontLabel = document.getElementById('fontSizeLabel');

function updateFontSize(){
  document.documentElement.style.setProperty('--fs', fontSize + 'rem');
  // Adjust line height slightly for readability
  const lh = fontSize > 1.4 ? 2.0 : fontSize < 1.0 ? 2.3 : 2.1;
  document.documentElement.style.setProperty('--lh', lh);
  fontLabel.textContent = Math.round(fontSize * 100) + '%';
}

document.getElementById('fontPlus').addEventListener('click', function(){
  if(fontSize < 1.8){ fontSize = Math.round((fontSize + 0.1)*10)/10; updateFontSize(); }
});
document.getElementById('fontMinus').addEventListener('click', function(){
  if(fontSize > 0.85){ fontSize = Math.round((fontSize - 0.1)*10)/10; updateFontSize(); }
});

/* ===== AUTO SCROLL ===== */
let autoScrollTimer = null;
let autoScrollSpeed = 35; // ms per px — lower = faster
const autoScrollBtn = document.getElementById('autoScrollBtn');

function startAutoScroll(){
  if(autoScrollTimer) return;
  autoScrollBtn.classList.add('active');
  autoScrollTimer = setInterval(function(){
    scrollArea.scrollTop += 1;
    // Stop at bottom
    if(scrollArea.scrollTop + scrollArea.clientHeight >= scrollArea.scrollHeight - 5){
      stopAutoScroll();
    }
  }, autoScrollSpeed);
}

function stopAutoScroll(){
  clearInterval(autoScrollTimer);
  autoScrollTimer = null;
  autoScrollBtn.classList.remove('active');
}

autoScrollBtn.addEventListener('click', function(){
  if(autoScrollTimer){ stopAutoScroll(); } else { startAutoScroll(); }
});

document.getElementById('scrollUpBtn').addEventListener('click', function(){
  stopAutoScroll();
  scrollArea.scrollBy({ top: -200, behavior: 'smooth' });
});
document.getElementById('scrollDownBtn').addEventListener('click', function(){
  stopAutoScroll();
  scrollArea.scrollBy({ top: 200, behavior: 'smooth' });
});

// Stop auto scroll on manual touch scroll
scrollArea.addEventListener('touchstart', function(){ stopAutoScroll(); }, { passive:true });

/* ===== SCREEN WAKE LOCK ===== */
let wakeLock = null;
const awakeBtn = document.getElementById('awakeBtn');
const awakeToast = document.getElementById('awakeToast');

awakeBtn.addEventListener('click', async function(){
  if(wakeLock){
    await wakeLock.release();
    wakeLock = null;
    awakeBtn.classList.remove('active');
    awakeToast.style.display = 'none';
  } else {
    try{
      if('wakeLock' in navigator){
        wakeLock = await navigator.wakeLock.request('screen');
        awakeBtn.classList.add('active');
        awakeToast.style.display = 'block';
        setTimeout(() => awakeToast.style.display = 'none', 3000);
        wakeLock.addEventListener('release', function(){
          wakeLock = null;
          awakeBtn.classList.remove('active');
        });
      } else {
        awakeToast.textContent = '⚠️ या ब्राउझरमध्ये उपलब्ध नाही';
        awakeToast.style.background = 'rgba(239,68,68,.15)';
        awakeToast.style.borderColor = 'rgba(239,68,68,.3)';
        awakeToast.style.color = '#f87171';
        awakeToast.style.display = 'block';
        setTimeout(() => awakeToast.style.display = 'none', 2500);
      }
    } catch(e){
      console.warn('Wake lock failed:', e);
    }
  }
});

// Re-acquire wake lock if page becomes visible again
document.addEventListener('visibilitychange', async function(){
  if(wakeLock && document.visibilityState === 'visible'){
    try{ wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
  }
});

/* ===============================
BUILD HOME LIST (data-driven, no duplicate markup)
================================ */

const aartiListEl = document.getElementById("aartiList");
const aartiIds = Object.keys(AARTIS);

document.getElementById("aartiCount").textContent = aartiIds.length + " आरत्या";

aartiIds.forEach(function(id){
  const entry = AARTIS[id];
  const spaceIdx = entry.title.indexOf(' ');
  const icon = spaceIdx > -1 ? entry.title.slice(0, spaceIdx) : '🪔';
  const label = spaceIdx > -1 ? entry.title.slice(spaceIdx + 1) : entry.title;
  const isComingSoon = entry.lyrics.trim() === "Coming Soon";

  const item = document.createElement('div');
  item.className = 'aarti-item';
  item.setAttribute('role', 'button');
  item.setAttribute('tabindex', '0');
  item.addEventListener('click', function(){ openAarti(id); });
  item.addEventListener('keydown', function(e){ if(e.key === 'Enter') openAarti(id); });

  const iconEl = document.createElement('div');
  iconEl.className = 'aarti-item-icon';
  iconEl.textContent = icon;

  const textEl = document.createElement('div');
  textEl.className = 'aarti-item-text';
  textEl.textContent = label;

  item.appendChild(iconEl);
  item.appendChild(textEl);

  if(isComingSoon){
    const badge = document.createElement('div');
    badge.className = 'aarti-item-badge';
    badge.textContent = 'लवकरच';
    item.appendChild(badge);
  }

  aartiListEl.appendChild(item);
});

/* ===============================
OPEN AARTI
================================ */

function openAarti(id){
  const entry = AARTIS[id];
  if(!entry) return;

  document.getElementById("homePage").style.display = "none";
  document.getElementById("readerPage").style.display = "block";
  document.getElementById("scrollControl").style.display = "flex";

  document.getElementById("aartiTitle").textContent = entry.title;

  const content = document.getElementById("aartiContent");
  content.innerHTML = "";

  const lyrics = entry.lyrics.trim();

  if(lyrics === "Coming Soon"){
    const card = document.createElement('div');
    card.className = 'coming-soon-card';
    card.innerHTML = '<span class="cs-icon">🪔</span>';
    const msg = document.createElement('p');
    msg.textContent = "ही आरती लवकरच जोडली जाईल.";
    card.appendChild(msg);
    content.appendChild(card);
  } else {
    // Split into verse blocks by blank lines; repeated blocks (dhruvapad / chorus)
    // are styled distinctly, without altering the lyric text itself.
    const blocks = lyrics.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
    const occurrences = {};
    blocks.forEach(b => { occurrences[b] = (occurrences[b] || 0) + 1; });

    let verseCounter = 0;
    blocks.forEach(block => {
      const isChorus = occurrences[block] > 1;
      const verseEl = document.createElement('div');
      verseEl.className = 'verse' + (isChorus ? ' chorus' : '');

      const labelEl = document.createElement('div');
      labelEl.className = 'verse-label' + (isChorus ? ' chorus-label' : '');
      if(isChorus){
        labelEl.textContent = 'धृवपद';
      } else {
        verseCounter++;
        labelEl.textContent = 'कडवे ' + verseCounter;
      }
      verseEl.appendChild(labelEl);

      block.split('\n').forEach(line => {
        line = line.trim();
        if(!line) return;
        const p = document.createElement('p');
        p.textContent = line;
        verseEl.appendChild(p);
      });

      content.appendChild(verseEl);
    });
  }

  scrollArea.scrollTop = 0;
}


/* ===============================
BACK
================================ */

function goHome(){
  stopAutoScroll();
  document.getElementById("readerPage").style.display = "none";
  document.getElementById("homePage").style.display = "block";
  document.getElementById("scrollControl").style.display = "none";
  scrollArea.scrollTop = 0;
}


/* ===============================
SEARCH
================================ */

const noResultsEl = document.getElementById("noResults");

document.getElementById("searchBox").addEventListener("input", function(){
  const value = this.value.trim().toLowerCase();
  const items = document.querySelectorAll(".aarti-item");
  let visibleCount = 0;

  items.forEach(function(item){
    const matches = item.textContent.toLowerCase().includes(value);
    item.style.display = matches ? "flex" : "none";
    if(matches) visibleCount++;
  });

  noResultsEl.style.display = visibleCount === 0 ? "block" : "none";
});
</script>
